<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div>
            <div id="iconoCartera"></div>
            <span>GESTOR DE FINANZAS</span>
        </div>
        <spa id="fecha"></span>
    </header>

    <main>
        <div class="card tipo3">
            <div class="cabecera_card_balance">
                <h2>INGRESOS TOTALES</h2>
            </div>
            <div class="cuerpo_card_balance">
                <span id="valor_ingreso">1500</span><span>€</span>
            </div>
        </div>

        <div class="card card_balance tipo3">
            <div class="cabecera_card_balance">
                <h2>GASTOS TOTALES</h2>
            </div>
            <div class="cuerpo_card_balance">
                <span id="valor_gasto">1500</span><span>€</span>
            </div>
        </div>

        <div class="card card_balance tipo3">
            <div class="cabecera_card_balance">
                <h2>BALANCE NETO</h2>
            </div>
            <div class="cuerpo_card_balance">
                <span id="valor_balance">1500</span><span>€</span>
            </div>
        </div>
  

        <div id="nueva_transaccion" class="card tipo2">
            <h2>NUEVA TRANSACCIÓN</h2>

            <form>
                <label for="tipo">TIPO:</label>
                <select name="tipo" id="tipo">
                    <option value="ingreso" disabled selected>Ingreso</option>
                    <option value="gasto">Gasto</option>
                </select>

                <label for="valor">IMPORTE (€):</label>
                <input type="number" required placeholder="0.00" id="valor">

                <label for="categoria">CATEGORÍA:</label>
                <select name="categoria" id="categoria">
                    <option value="facturas" disabled selected>Facturas</option>
                    <option value="alquiler">Alquiler</option>
                    <option value="alimentación">Alimentación</option>
                    <option value="transporte">Transporte</option>
                    <option value="seguros">Seguros</option>
                    <option value="ocio">Ocio</option>
                    <option value="ingreso">Inngreso</option>
                </select>

                <label for="descripcion">DESCRIPCIÓN:</label>
                <input type="text" required placeholder="Descripción de la transacción" id="descripcion">

                <button type="submit" id="add_transaccion">Añadir transacción</button>
            </form>
        </div>

        <div id="distribucion_gastos" class="card tipo2">
            <h2>DISTRIBUCIÓN DE GASTOS</h2>
        </div>


        <div id="historial_transacciones" class="card tipo2">
            <h2>HISTORIAL DE TRANSACCIONES</h2>
        </div>

        <div id="grafico_saldo" class="card tipo2">
            <h2>EVOLUCIÓN DEL SALDO</h2>
        </div>
    </main>
    
</body>
</html>
